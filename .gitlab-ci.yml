image: hashicorp/terraform:latest

stages:
  - validate
  - plan
  - apply

before_script:
  - terraform init

validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan
  only:
    - main

terraform_apply:
  stage: apply
  script:
    - terraform apply -auto-approve
  when: manual
  only:
    - main
